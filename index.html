<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>welcome suckers</title>
    <style>
        body {
            background-color: rgb(75, 182, 27);
            color: #0ff000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; }
        p { font-size: 1.5rem; color: #ff00ea; }

        #run-away-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background: rgb(0, 0, 0);
            border: none;
            cursor: pointer;
            position: absolute;
            transition: 0.1s;
        }
    </style>
</head>
<body>

    <h1>click on the black shape if ur smart</h1>
    <p id="insult">u really suck ok <br> 0 funnet.</p>

    <button id="run-away-btn" onmouseover="flykt()">click if u think ur smart</button>

    <script>
        const fornærmelser = [
            "you suck",
            "u look like a person who likes air",
            "u still suck",
            "u smell like feet"
        ];

        // Bytter fornærmelse hvert 3. sekund
        setInterval(() => {
            const random = Math.floor(Math.random() * fornærmelser.length);
            document.getElementById('insult').innerText = fornærmelser[random];
        }, 3000);

        // Gjør det umulig å klikke på knappen
        function flykt() {
            const btn = document.getElementById('run-away-btn');
            const x = Math.random() * (window.innerWidth - btn.clientWidth);
            const y = Math.random() * (window.innerHeight - btn.clientHeight);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }
    </script>
</body>
</html>
